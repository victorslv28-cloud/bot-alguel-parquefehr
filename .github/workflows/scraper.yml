name: Bot de Aluguel de Imóveis

on:
  schedule:
    # Executa a cada hora entre 7h05 e 20h05 (Brasília) -> 10h-23h UTC
    - cron: '5 10-23 * * *'
    # Executa a cada duas horas entre 21h05 e 6h05 (Brasília) -> 0h-9h UTC
    - cron: '5 0-9/2 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

permissions:
  contents: write # Permissão necessária para o bot commitar o arquivo de volta no repositório

# Evita que múltiplas execuções rodem ao mesmo tempo (ajuda se o GitHub atrasar e acumular)
concurrency:
  group: bot-aluguel
  cancel-in-progress: true

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Acelera a instalação das dependências

      - name: Instalar Dependências
        run: pip install -r requirements.txt

      - name: Rodar o Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commitar e Fazer Push do json (Memória do Bot)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "bot@github.com"
          git add imoveis.json config.json
          git commit -m "chore: atualizar banco de dados e configuracoes do bot" || echo "Sem mudanças para commitar"
          git push
